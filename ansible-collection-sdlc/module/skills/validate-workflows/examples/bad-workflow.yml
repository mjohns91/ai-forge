#    - Missing permissions block
#    - permissions: write-all usage
#    - Deprecated actions/checkout@v2 (2 instances)
#    - Deprecated actions/setup-node@v1
#    - Secrets echoed/logged (3 instances)
#
# ⚠️ Warnings: 5 issues
#    - Mutable ref actions/cache@main
#    - Mutable ref random-user/deploy-action@master
#    - Untrusted action random-user/deploy-action
#    - Untrusted action some-person/slack-notify
