---
name: Bug Report
description: File a bug report.
title: "[Bug]: "
type: bug
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: >
        **Thank you for your feedback for Ansible ai-forge**

  - type: textarea
    attributes:
      label: Summary
      description: Explain the problem briefly below.
      placeholder: >-
        When I try to do X with the Ansible ai-forge from the devel branch on GitHub, Y
        breaks in a way Z under the env E. Here are all the details I know
        about this problem...
    validations:
      required: true

  - type: textarea
    attributes:
      label: ansible ai-forge version
      description: >-
        What version of ai-forge are you using?
      render: console
      value: |
        fixme
      placeholder: |
        fixme

  - type: textarea
    attributes:
      label: OS / Environment
      description: >-
        Provide all relevant information below, e.g. target OS versions, node version etc.
      placeholder: RHEL 8, Node.js 20.x etc.

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: |
        Describe exactly how to reproduce the problem, using a minimal test-case. It would *really* help us understand your problem if you could also provide any configs and commands you used.

        **HINT:** You can paste https://gist.github.com links for larger files.

  - type: textarea
    attributes:
      label: Expected Results
      description: >-
        Describe what you expected to happen when running the steps above.
      placeholder: >-
        I expected X to happen because I assumed Y and was shocked
        that it did not.

  - type: textarea
    attributes:
      label: Actual Results
      description: Describe what actually happened.

  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: |
        Read the [Ansible Code of Conduct][CoC] first.

        [CoC]: https://docs.ansible.com/projects/ansible/latest/community/code_of_conduct.html
      options:
        - label: I agree to follow the Ansible Code of Conduct
          required: true
