---
# Ref: https://help.github.com/en/github/building-a-strong-community/configuring-issue-templates-for-your-repository#configuring-the-template-chooser
blank_issues_enabled: false  # default: true
contact_links:
  - name: 🔐 Security bug report 🔥
    url: https://docs.ansible.com/projects/ansible/latest/community/reporting_bugs_and_features.html
    about: |
      Please learn how to report security vulnerabilities here.

      For all security related bugs, email security@ansible.com
      instead of using this issue tracker and you will receive
      a prompt response.

      For more information, see
      https://docs.ansible.com/projects/ansible/latest/community/reporting_bugs_and_features.html
  - name: 📝 Ansible Code of Conduct
    url: https://docs.ansible.com/projects/ansible/latest/community/code_of_conduct.html
    about: ❤ Be nice to other members of the community. ☮ Behave.
  - name: 💬 Talk to the community
    url: https://docs.ansible.com/projects/ansible/latest/community/communication.html
    about: Please ask and answer usage questions here
  - name: ⚡ AI on the Ansible Forum
    url: https://forum.ansible.com/tag/ai
    about: Interested in improving a specific area? Become a part of a working group!
