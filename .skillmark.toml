fail-on = "errors"
min-score = 100

[rules]
disable = ["E030", "E033"]
experimental = false

[scoring.weights]
spec-compliance = 0.40
description-quality = 0.20
content-efficiency = 0.15
composability-clarity = 0.10
script-quality = 0.10
discoverability = 0.05

[paths]
exclude = ["drafts/", "vendor/"]
